name: tests

on:
  push:
  pull_request:

jobs:
  scientific-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: python -m json.tool notebooks/02_q2_connectivity_experiment.ipynb > /dev/null
